<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UZDARUS PRO | Parolni yangilash</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body data-page="change-password">
    <main class="cabinet-shell">
        <header class="cabinet-header">
            <h1>Parolni almashtirish</h1>
            <p>Xavfsizlik uchun yangi parolni ikki marta kiriting</p>
        </header>

        <section class="cabinet-body">
            <div class="notice error" id="changeError"></div>
            <div class="notice success" id="changeSuccess"></div>

            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="newPassword">Yangi parol</label>
                    <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" minlength="8" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Parolni takrorlang</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required>
                </div>

                <button class="btn" id="changeBtn" type="submit">Parolni saqlash</button>
            </form>
        </section>
    </main>

    <script type="module" src="./cabinet.js"></script>
</body>

</html>
